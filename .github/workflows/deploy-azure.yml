# SaltAIr-style: push to main → Docker build (ACR) → Azure Container Apps
# Prereq: GitHub secret AZURE_CREDENTIALS (JSON from az ad sp create-for-rbac --sdk-auth)
# Optional vars: AZURE_RESOURCE_GROUP, AZURE_CONTAINER_APP_NAME, AZURE_CONTAINER_ENV

name: Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP || 'jazz-fest-2026-rg' }}
  AZURE_CONTAINER_APP_NAME: ${{ vars.AZURE_CONTAINER_APP_NAME || 'jazz-fest-2026-web' }}
  AZURE_CONTAINER_ENV: ${{ vars.AZURE_CONTAINER_ENV || 'jazz-fest-2026-env' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create Resource Group
        run: |
          az group create --name ${{ env.AZURE_RESOURCE_GROUP }} --location eastus --output none

      - name: Create Container Apps Environment
        run: |
          az containerapp env show --name ${{ env.AZURE_CONTAINER_ENV }} --resource-group ${{ env.AZURE_RESOURCE_GROUP }} --output none 2>/dev/null || \
          az containerapp env create \
            --name ${{ env.AZURE_CONTAINER_ENV }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --location eastus \
            --output none

      - name: Get or create ACR
        id: acr
        run: |
          ACR_NAME="${AZURE_RESOURCE_GROUP//-/}acr"
          az acr create --name $ACR_NAME --resource-group ${{ env.AZURE_RESOURCE_GROUP }} --sku Basic --output none 2>/dev/null || true
          echo "registry=$ACR_NAME" >> $GITHUB_OUTPUT
          echo "login_server=$ACR_NAME.azurecr.io" >> $GITHUB_OUTPUT

      - name: Build and push image
        run: |
          APP="${{ env.AZURE_CONTAINER_APP_NAME }}"
          REPO="${APP//-/}"
          az acr build --registry ${{ steps.acr.outputs.registry }} \
            --image "${REPO}:${{ github.sha }}" \
            --file Dockerfile .

      # Use the same Azure AD app as azure/login (AZURE_CLIENT_ID / AZURE_CLIENT_SECRET) for registry auth.
      # That service principal must have AcrPull on the ACR (one-time): az role assignment create --assignee <appId> --role AcrPull --scope $(az acr show -g RG -n NAME --query id -o tsv)
      # ACR admin user + password often break Container Apps image validation (OAuth realm / UNAUTHORIZED).
      - name: Create or update Container App
        id: deploy
        env:
          CREDS_JSON: ${{ secrets.AZURE_CREDENTIALS }}
        run: |
          set -e
          LOGIN_SERVER="${{ steps.acr.outputs.login_server }}"
          APP_NAME="${{ env.AZURE_CONTAINER_APP_NAME }}"
          RG="${{ env.AZURE_RESOURCE_GROUP }}"
          REPO="${APP_NAME//-/}"
          IMAGE="${LOGIN_SERVER}/${REPO}:${{ github.sha }}"

          # azure/login does not export AZURE_CLIENT_SECRET to later steps; read SP creds from the same JSON.
          CLIENT_ID=$(echo "$CREDS_JSON" | jq -r .clientId)
          CLIENT_SECRET=$(echo "$CREDS_JSON" | jq -r .clientSecret)
          if [ -z "$CLIENT_ID" ] || [ "$CLIENT_ID" = "null" ] || [ -z "$CLIENT_SECRET" ] || [ "$CLIENT_SECRET" = "null" ]; then
            echo "::error::Could not parse clientId/clientSecret from AZURE_CREDENTIALS"
            exit 1
          fi
          PASS_FILE="${RUNNER_TEMP:-/tmp}/acr-sp-secret.pass"
          printf '%s' "$CLIENT_SECRET" > "$PASS_FILE"
          chmod 600 "$PASS_FILE"

          # Prior failed deploys can leave the app in ProvisioningState=Failed; updates then error with
          # ResourceNotProvisioned. Remove a failed app so we can create a clean one.
          if az containerapp show --name "$APP_NAME" --resource-group "$RG" &>/dev/null; then
            PROV=$(az containerapp show --name "$APP_NAME" --resource-group "$RG" --query "properties.provisioningState" -o tsv)
            if [ "$PROV" = "Failed" ]; then
              echo "Removing failed Container App for clean redeploy..."
              az containerapp delete --name "$APP_NAME" --resource-group "$RG" --yes --output none
            fi
          fi

          EXISTS=$(az containerapp show --name "$APP_NAME" --resource-group "$RG" --query name -o tsv 2>/dev/null || true)
          if [ -z "$EXISTS" ]; then
            az containerapp create \
              --name "$APP_NAME" \
              --resource-group "$RG" \
              --environment ${{ env.AZURE_CONTAINER_ENV }} \
              --image "$IMAGE" \
              --target-port 80 \
              --ingress external \
              --registry-server "$LOGIN_SERVER" \
              --registry-username "$CLIENT_ID" \
              --registry-password "@${PASS_FILE}" \
              --output none
          else
            az containerapp registry set \
              --name "$APP_NAME" \
              --resource-group "$RG" \
              --server "$LOGIN_SERVER" \
              --username "$CLIENT_ID" \
              --password "@${PASS_FILE}"
            az containerapp update \
              --name "$APP_NAME" \
              --resource-group "$RG" \
              --image "$IMAGE" \
              --output none
          fi
          rm -f "$PASS_FILE"
          FQDN=$(az containerapp show --name "$APP_NAME" --resource-group "$RG" --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "url=https://$FQDN" >> $GITHUB_OUTPUT

      - name: Deployment URL
        run: echo "Deployed to ${{ steps.deploy.outputs.url }}"
