# SaltAIr-style: push to main → Docker build (ACR) → Azure Container Apps
# Prereq: GitHub secret AZURE_CREDENTIALS (JSON from az ad sp create-for-rbac --sdk-auth)
# Optional vars: AZURE_RESOURCE_GROUP, AZURE_CONTAINER_APP_NAME, AZURE_CONTAINER_ENV

name: Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP || 'jazz-fest-2026-rg' }}
  AZURE_CONTAINER_APP_NAME: ${{ vars.AZURE_CONTAINER_APP_NAME || 'jazz-fest-2026-web' }}
  AZURE_CONTAINER_ENV: ${{ vars.AZURE_CONTAINER_ENV || 'jazz-fest-2026-env' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create Resource Group
        run: |
          az group create --name ${{ env.AZURE_RESOURCE_GROUP }} --location eastus --output none

      - name: Create Container Apps Environment
        run: |
          az containerapp env show --name ${{ env.AZURE_CONTAINER_ENV }} --resource-group ${{ env.AZURE_RESOURCE_GROUP }} --output none 2>/dev/null || \
          az containerapp env create \
            --name ${{ env.AZURE_CONTAINER_ENV }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --location eastus \
            --output none

      - name: Get or create ACR
        id: acr
        run: |
          ACR_NAME="${AZURE_RESOURCE_GROUP//-/}acr"
          az acr create --name $ACR_NAME --resource-group ${{ env.AZURE_RESOURCE_GROUP }} --sku Basic --output none 2>/dev/null || true
          echo "registry=$ACR_NAME" >> $GITHUB_OUTPUT
          echo "login_server=$ACR_NAME.azurecr.io" >> $GITHUB_OUTPUT

      - name: Build and push image
        run: |
          az acr build --registry ${{ steps.acr.outputs.registry }} \
            --image ${{ env.AZURE_CONTAINER_APP_NAME }}:${{ github.sha }} \
            --file Dockerfile .

      - name: Enable ACR admin and get credentials
        id: acr-creds
        run: |
          az acr update --name ${{ steps.acr.outputs.registry }} --admin-enabled true --output none
          USER=$(az acr credential show --name ${{ steps.acr.outputs.registry }} --query "username" -o tsv)
          PASS=$(az acr credential show --name ${{ steps.acr.outputs.registry }} --query "passwords[0].value" -o tsv)
          echo "username=$USER" >> $GITHUB_OUTPUT
          echo "password=$PASS" >> $GITHUB_OUTPUT

      - name: Create or update Container App
        id: deploy
        run: |
          EXISTS=$(az containerapp show --name ${{ env.AZURE_CONTAINER_APP_NAME }} --resource-group ${{ env.AZURE_RESOURCE_GROUP }} --output tsv 2>/dev/null || echo "")
          IMAGE="${{ steps.acr.outputs.login_server }}/${{ env.AZURE_CONTAINER_APP_NAME }}:${{ github.sha }}"
          if [ -z "$EXISTS" ]; then
            az containerapp create \
              --name ${{ env.AZURE_CONTAINER_APP_NAME }} \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --environment ${{ env.AZURE_CONTAINER_ENV }} \
              --image $IMAGE \
              --target-port 80 \
              --ingress external \
              --registry-server ${{ steps.acr.outputs.login_server }} \
              --registry-username ${{ steps.acr-creds.outputs.username }} \
              --registry-password ${{ steps.acr-creds.outputs.password }} \
              --output none
          else
            az containerapp update \
              --name ${{ env.AZURE_CONTAINER_APP_NAME }} \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --image $IMAGE \
              --output none
          fi
          FQDN=$(az containerapp show --name ${{ env.AZURE_CONTAINER_APP_NAME }} --resource-group ${{ env.AZURE_RESOURCE_GROUP }} --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "url=https://$FQDN" >> $GITHUB_OUTPUT

      - name: Deployment URL
        run: echo "Deployed to ${{ steps.deploy.outputs.url }}"
