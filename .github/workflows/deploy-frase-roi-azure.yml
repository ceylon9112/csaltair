# Frase Security ROI IQ — Vite SPA → nginx on Azure Container Apps (SaltAIr / csaltair pattern).
# Prereq: repository secret AZURE_CREDENTIALS (same as Jazz Fest / Frase Annual Review).

name: Deploy Frase ROI IQ to Azure Container Apps

on:
  push:
    branches: [main]
    paths:
      - 'frase-security-roi-iq/**'
      - '.github/workflows/deploy-frase-roi-azure.yml'
  workflow_dispatch:

concurrency:
  group: frase-roi-iq-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  AZURE_RESOURCE_GROUP: ${{ vars.FRASE_ROI_AZURE_RESOURCE_GROUP || 'frase-roi-iq-rg' }}
  AZURE_CONTAINER_APP_NAME: ${{ vars.FRASE_ROI_AZURE_CONTAINER_APP_NAME || 'frase-roi-iq-web' }}
  AZURE_CONTAINER_ENV: ${{ vars.FRASE_ROI_AZURE_CONTAINER_ENV || 'frase-roi-iq-env' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: frase-security-roi-iq
        run: npm install --no-audit --no-fund

      - name: Build
        working-directory: frase-security-roi-iq
        run: npm run build

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create Resource Group
        run: |
          az group create --name ${{ env.AZURE_RESOURCE_GROUP }} --location eastus --output none

      - name: Create Container Apps Environment
        run: |
          az containerapp env show --name ${{ env.AZURE_CONTAINER_ENV }} --resource-group ${{ env.AZURE_RESOURCE_GROUP }} --output none 2>/dev/null || \
          az containerapp env create \
            --name ${{ env.AZURE_CONTAINER_ENV }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --location eastus \
            --output none

      - name: Get or create ACR
        id: acr
        run: |
          set -euo pipefail
          RG="${{ env.AZURE_RESOURCE_GROUP }}"
          SLUG=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]' | tr -cd 'a-z0-9')
          NAME="fraseoi${SLUG}acr"
          if [ "${#NAME}" -gt 50 ]; then
            NAME=$(echo "$NAME" | cut -c1-50)
          fi
          echo "Using ACR name: $NAME (resource group: $RG)"
          if ! az acr show --name "$NAME" --resource-group "$RG" &>/dev/null; then
            az acr create --name "$NAME" --resource-group "$RG" --sku Basic --output none
          fi
          echo "registry=$NAME" >> "$GITHUB_OUTPUT"
          echo "login_server=$NAME.azurecr.io" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        run: |
          set -euo pipefail
          APP="${{ env.AZURE_CONTAINER_APP_NAME }}"
          REPO="${APP//-/}"
          CTX="${RUNNER_TEMP}/frase-roi-acr-ctx"
          rm -rf "$CTX"
          mkdir -p "$CTX"
          cp -r frase-security-roi-iq/dist "$CTX/"
          cp frase-security-roi-iq/nginx-spa.conf "$CTX/"
          cp frase-security-roi-iq/Dockerfile "$CTX/"
          cd "$CTX"
          az acr build --registry "${{ steps.acr.outputs.registry }}" \
            --image "${REPO}:${{ github.sha }}" \
            --file Dockerfile \
            .

      - name: Create or update Container App
        id: deploy
        env:
          CREDS_JSON: ${{ secrets.AZURE_CREDENTIALS }}
        run: |
          set -e
          LOGIN_SERVER="${{ steps.acr.outputs.login_server }}"
          APP_NAME="${{ env.AZURE_CONTAINER_APP_NAME }}"
          RG="${{ env.AZURE_RESOURCE_GROUP }}"
          REPO="${APP_NAME//-/}"
          IMAGE="${LOGIN_SERVER}/${REPO}:${{ github.sha }}"

          CLIENT_ID=$(echo "$CREDS_JSON" | jq -r .clientId)
          CLIENT_SECRET=$(echo "$CREDS_JSON" | jq -r .clientSecret)
          if [ -z "$CLIENT_ID" ] || [ "$CLIENT_ID" = "null" ] || [ -z "$CLIENT_SECRET" ] || [ "$CLIENT_SECRET" = "null" ]; then
            echo "::error::Could not parse clientId/clientSecret from AZURE_CREDENTIALS"
            exit 1
          fi
          PASS_FILE="${RUNNER_TEMP:-/tmp}/acr-sp-secret.pass"
          printf '%s' "$CLIENT_SECRET" > "$PASS_FILE"
          chmod 600 "$PASS_FILE"

          if az containerapp show --name "$APP_NAME" --resource-group "$RG" &>/dev/null; then
            PROV=$(az containerapp show --name "$APP_NAME" --resource-group "$RG" --query "properties.provisioningState" -o tsv)
            if [ "$PROV" = "Failed" ]; then
              echo "Removing failed Container App for clean redeploy..."
              az containerapp delete --name "$APP_NAME" --resource-group "$RG" --yes --output none
            fi
          fi

          EXISTS=$(az containerapp show --name "$APP_NAME" --resource-group "$RG" --query name -o tsv 2>/dev/null || true)
          if [ -z "$EXISTS" ]; then
            az containerapp create \
              --name "$APP_NAME" \
              --resource-group "$RG" \
              --environment ${{ env.AZURE_CONTAINER_ENV }} \
              --image "$IMAGE" \
              --target-port 80 \
              --ingress external \
              --registry-server "$LOGIN_SERVER" \
              --registry-username "$CLIENT_ID" \
              --registry-password "@${PASS_FILE}" \
              --output none
          else
            az containerapp registry set \
              --name "$APP_NAME" \
              --resource-group "$RG" \
              --server "$LOGIN_SERVER" \
              --username "$CLIENT_ID" \
              --password "@${PASS_FILE}"
            az containerapp update \
              --name "$APP_NAME" \
              --resource-group "$RG" \
              --image "$IMAGE" \
              --output none
          fi
          rm -f "$PASS_FILE"
          FQDN=$(az containerapp show --name "$APP_NAME" --resource-group "$RG" --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "url=https://$FQDN" >> $GITHUB_OUTPUT

      - name: Deployment URL
        run: echo "Deployed to ${{ steps.deploy.outputs.url }}"
